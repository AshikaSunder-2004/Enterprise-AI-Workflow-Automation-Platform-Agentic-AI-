databases:
  - name: aiwf-postgres
    databaseName: aiwf_db
    user: aiwf
    plan: free

services:
  - type: web
    name: aiwf-api
    env: node
    plan: free
    buildCommand: "cd backend && npm install && npm run prisma:generate && npm run build && npx prisma db push --accept-data-loss"
    startCommand: "cd backend && npm run start:worker & cd backend && npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aiwf-postgres
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: WORKER_MODE
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: REDIS_URL
        sync: false # You must provide this in the Render dashboard (e.g. from Upstash)
